name: Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    uses: ./.github/workflows/common-prepare.yml

  analyze-packages:
    needs: prepare
    if: needs.prepare.outputs.packages == 'true'
    runs-on: ubuntu-latest

    outputs:
      packages: ${{ steps.package_filter.outputs.changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter packages
        uses: dorny/paths-filter@v4
        id: package_filter
        with:
          filters: .github/package-filters.yml

  build-packages:
    needs: analyze-packages
    if: needs.analyze-packages.outputs.packages != '[]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build calls packages
        run: pnpm exec turbo run build --filter='./packages/calls...'

      - name: Upload built packages
        uses: actions/upload-artifact@v4
        with:
          name: calls-packages
          path: packages/
          retention-days: 1

  publish-packages:
    needs: [analyze-packages, build-packages]
    if: |
      needs.analyze-packages.outputs.packages != '[]' &&
      contains(fromJSON(needs.analyze-packages.outputs.packages), matrix.package)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    environment: >-
      ${{
        contains(fromJSON('["niqzart", "unknownproperty"]'), github.triggering_actor)
        && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        && 'xi-production'
        || 'xi-production-manual'
      }}

    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        package:
          - calls.types
          - calls.config
          - calls.utils
          - calls.store
          - calls.providers
          - calls.hooks
          - calls.ui
          - calls.risehand
          - calls.chat
          - calls.compactview
          - calls

    steps:
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: calls-packages
          path: packages

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (required for trusted publishing)
        run: npm install -g npm@latest

      - name: Publish package
        working-directory: packages/${{ matrix.package }}
        run: npm publish --access public --provenance
