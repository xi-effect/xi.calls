name: Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    uses: ./.github/workflows/common-prepare.yml

  analyze-packages:
    needs: prepare
    if: needs.prepare.outputs.packages == 'true'
    runs-on: ubuntu-latest

    outputs:
      packages: ${{ steps.package_filter.outputs.changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate package filters
        id: generate_filters
        uses: ./.github/actions/generate-package-filters

      - name: Filter packages
        uses: dorny/paths-filter@v4
        id: package_filter
        with:
          filters: ${{ steps.generate_filters.outputs.output-file }}

  deploy-packages:
    needs: analyze-packages
    if: needs.analyze-packages.outputs.packages != '[]'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    environment: >-
      ${{
        contains(fromJSON('["niqzart", "unknownproperty"]'), github.triggering_actor)
        && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        && 'xi-production'
        || 'xi-production-manual'
      }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (required for trusted publishing)
        run: npm install -g npm@latest

      - name: Verify Node/npm/pnpm versions
        run: |
          node -v
          npm -v
          pnpm -v

      - name: Build calls packages
        run: pnpm exec turbo run build --filter='./packages/calls...'

      - name: Publish changed packages
        uses: ./.github/actions/publish-calls-packages
        with:
          changed-packages: ${{ needs.analyze-packages.outputs.packages }}
