name: Publish changed calls packages
description: Publish changed @xipkg/calls-* packages in dependency order (npm trusted publishing / OIDC)

inputs:
  changed-packages:
    description: JSON array from dorny/paths-filter, e.g. ["calls.types","calls.hooks"]
    required: true

runs:
  using: composite
  steps:
    - name: Publish changed packages
      shell: bash
      run: node scripts/publish-calls-packages.mjs --changed-packages '${{ inputs.changed-packages }}' --provenance
